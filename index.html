<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="SNSで見つけたレシピ動画を保存して、家族のリピート周期から1週間の献立候補を作る、ごはんメモMVPです。">
    <meta property="og:title" content="リピごち">
    <meta property="og:description" content="家族の「また食べたい周期」を残す、ごはんメモ">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://165cm.github.io/matagochi/">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://165cm.github.io/matagochi/">
    <title>リピごち</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">家族の「また食べたい周期」を残す、ごはんメモ</p>
          <h1>リピごち</h1>
        </div>
        <button class="icon-button" type="button" data-action="reset-demo" aria-label="データをリセット" title="データをリセット">↺</button>
      </header>

      <main id="app" class="screen" aria-live="polite"></main>

      <nav class="bottom-tabs" aria-label="主要画面">
        <button class="tab is-active" type="button" data-view="collection" aria-label="コレクション">
          <span>探す</span>
        </button>
        <button class="tab" type="button" data-view="plan">
          <span>献立</span>
        </button>
        <button class="tab add-tab" type="button" data-view="register" aria-label="新規登録">
          <span class="add-icon">＋</span>
          <span>登録</span>
        </button>
        <button class="tab" type="button" data-view="repeat" aria-label="リピ周期">
          <span>リピ</span>
        </button>
        <button class="tab" type="button" data-view="settings">
          <span>設定</span>
        </button>
      </nav>
    </div>

    <script>
      window.MATAGOCHI_API_BASE_URL = "https://matagochi-api-292190013809.us-central1.run.app";
    </script>
    <script src="app.js?v=ripigochi"></script>
  </body>
</html>
